<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexPlanet Task 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <h2>ApexPlanet Internship</h2>

        <ul class="nav-links">
            <li><a href="#contact">Contact</a></li>
            <li><a href="#todo">To-Do List</a></li>
        </ul>
    </nav>

    <!-- Main Grid Layout -->
    <div class="container">

        <!-- Contact Form Section -->
        <section id="contact" class="card">
            <h2>Contact Form</h2>

            <form id="contactForm">

                <input
                    type="text"
                    id="name"
                    placeholder="Enter Your Name"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Enter Your Email"
                >

                <button type="submit">
                    Submit
                </button>

                <p id="message"></p>

            </form>
        </section>

        <!-- To Do List Section -->
        <section id="todo" class="card">
            <h2>To-Do List</h2>

            <div class="todo-container">
                <input
                    type="text"
                    id="taskInput"
                    placeholder="Enter Task"
                >

                <button onclick="addTask()">
                    Add Task
                </button>
            </div>

            <ul id="taskList"></ul>
        </section>

    </div>

    <script src="script.js"></script>

</body>
</html>
