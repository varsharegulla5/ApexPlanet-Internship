<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Styling and JavaScript</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Advanced Styling & JavaScript</h1>
    <p>Responsive Design | Quiz | API Fetch</p>
</header>

<div class="container">

    <!-- Responsive Section -->
    <section class="card">
        <h2>Responsive Design</h2>

        <div class="responsive-boxes">
            <div class="box">HTML</div>
            <div class="box">CSS</div>
            <div class="box">JavaScript</div>
        </div>
    </section>

    <!-- Quiz Section -->
    <section class="card">

        <h2>Interactive Quiz</h2>

        <div id="quiz">

            <h3 id="question"></h3>

            <div id="answers"></div>

            <button id="nextBtn" onclick="nextQuestion()">Next</button>

        </div>

    </section>

    <!-- API Section -->
    <section class="card">

        <h2>Random Joke Generator</h2>

        <p id="joke">Click the button to load a random joke.</p>

        <button id="jokeBtn" onclick="getJoke()">Get Joke</button>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
